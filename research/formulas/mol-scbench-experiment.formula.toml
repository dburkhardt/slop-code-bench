description = """
SCBench experiment molecule. Runs a complete baseline vs two-agent \
comparison on a single problem via experiment_pipeline.py.

The pipeline handles EVERYTHING: baseline run, two-agent run, evaluation, \
Dolt INSERT, and budget UPDATE. The polecat's job is to call it correctly \
and verify the output.

IMPORTANT: The pipeline is a SINGLE COMMAND. Do NOT run slop-code or \
two_agent_runner.py individually — use experiment_pipeline.py which \
orchestrates both arms end-to-end.

CRITICAL: The pipeline takes 15-30 MINUTES to complete. You MUST set \
a timeout of at least 45 minutes (2700 seconds) on the Bash tool call. \
Do NOT let it timeout at the default 2 minutes.
"""
formula = "mol-scbench-experiment"
type = "workflow"
version = 2

[vars]
[vars.problem_id]
description = "SCBench problem ID to run"
required = true

[vars.model]
description = "Model to use (e.g., local-sonnet-4.6)"
required = true

[vars.hypothesis_id]
description = "Bead ID of the hypothesis being tested"
required = true

[vars.hypothesis_description]
description = "Plain-text description of what this experiment tests"
required = true

[vars.total_budget_usd]
description = "Maximum spend for this experiment in USD"
required = true

[vars.implementer_prompt]
description = "Path to implementer Jinja prompt template"
default = "configs/prompts/default_implementer.jinja"

[vars.reviewer_prompt]
description = "Path to reviewer Jinja prompt template"
default = "configs/prompts/default_reviewer.jinja"

[vars.budget_split]
description = "Percentage of per-checkpoint budget for implementer (e.g., 70)"
default = "70"

[[steps]]
id = "preflight"
title = "Verify environment"
description = """
Quick checks before running the pipeline:

```bash
# Verify venv
ls .venv/bin/python && echo "venv OK"

# Verify Dolt
python3 -c "import pymysql; c=pymysql.connect(host='127.0.0.1',port=3307,user='root',database='scbench'); print('Dolt OK'); c.close()"

# Verify claude CLI
which claude && echo "claude OK"
```

**Exit criteria:** All three checks pass. If any fail, run:
```bash
# Fix venv if missing
uv sync
```
"""

[[steps]]
id = "run-pipeline"
title = "Run the full experiment pipeline"
needs = ["preflight"]
description = """
Run experiment_pipeline.py. This is ONE command that handles everything: \
baseline run, two-agent run, evaluation, Dolt INSERT, and budget UPDATE.

⚠️ **CRITICAL: SET TIMEOUT TO 2700 SECONDS (45 minutes).** ⚠️
The pipeline takes 15-30 minutes. The default Bash timeout of 2 minutes \
will kill the experiment before it completes. You MUST pass timeout=2700000 \
(45 min in milliseconds) to the Bash tool.

```bash
.venv/bin/python research/runner/experiment_pipeline.py \
  --problem {{problem_id}} \
  --model {{model}} \
  --budget {{total_budget_usd}} \
  --budget-split {{budget_split}} \
  --implementer-prompt {{implementer_prompt}} \
  --reviewer-prompt {{reviewer_prompt}} \
  --hypothesis-id {{hypothesis_id}} \
  --use-dolt
```

**Set timeout: 2700000 milliseconds (45 minutes).**

Wait for the command to complete. Do NOT run it in the background. \
Do NOT proceed to the next step until it exits.

**Exit criteria:** Pipeline exits with return code 0 and prints \
"Inserted N experiment row(s)." If it fails, note the error and \
proceed to report step anyway.
"""

[[steps]]
id = "report"
title = "Write research report and persist findings"
needs = ["run-pipeline"]
description = """
Verify the pipeline wrote to Dolt:

```bash
cd ~/gt/.dolt-data/scbench && dolt sql -q \
  "SELECT id, problem_id, mode, total_pass_rate, total_cost \
   FROM experiments ORDER BY id DESC LIMIT 4;"
```

Persist findings to the bead:
```bash
bd note {{hypothesis_id}} "Experiment complete. Problem: {{problem_id}}. \
Results: <pass_rate> pass, <cost> cost. Dolt rows inserted."
```

Commit any local changes:
```bash
git add -A && git commit -m "experiment: {{problem_id}} {{hypothesis_id}}" || true
```

Then run gt done:
```bash
gt done
```

**Exit criteria:** Findings persisted. gt done executed.
"""
