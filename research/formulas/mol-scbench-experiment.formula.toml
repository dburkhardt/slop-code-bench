description = """
SCBench experiment molecule. Runs a complete baseline vs two-agent \
comparison on a single problem via experiment_pipeline.py.

The pipeline handles EVERYTHING: baseline run, two-agent run, evaluation, \
Dolt INSERT, and budget UPDATE. The polecat's job is to call it correctly \
and verify the output.

IMPORTANT: The pipeline is a SINGLE COMMAND. Do NOT try to run slop-code \
or two_agent_runner.py individually — use experiment_pipeline.py which \
orchestrates both arms end-to-end."""
formula = "mol-scbench-experiment"
type = "workflow"
version = 2

[vars]
[vars.problem_id]
description = "SCBench problem ID to run"
required = true

[vars.model]
description = "Model to use (e.g., claude_code_local/local-claude-sonnet-4-6)"
required = true

[vars.hypothesis_id]
description = "Bead ID of the hypothesis being tested"
required = true

[vars.hypothesis_description]
description = "Plain-text description of what this experiment tests"
required = true

[vars.total_budget_usd]
description = "Maximum spend per arm in USD"
required = true

[vars.budget_split]
description = "Percentage of per-checkpoint budget for implementer (e.g., 70)"
default = "70"

[[steps]]
id = "preflight"
title = "Verify environment and connectivity"
description = """
Verify the experiment can run before spending API credits.

```bash
REPO_ROOT="$(git rev-parse --show-toplevel)"
cd "$REPO_ROOT"

# 0. Create venv if it doesn't exist (worktrees don't have it)
if [ ! -d .venv ]; then
  echo "Creating .venv (worktree doesn't have one)..."
  uv venv .venv --python 3.12
  uv pip install -e ".[dev]" --python .venv/bin/python
  uv pip install pymysql typer --python .venv/bin/python
fi

# 1. Verify Python venv exists and has dependencies
.venv/bin/python -c "import slop_code; import pymysql; import typer; print('deps OK')"

# 2. Verify Dolt is reachable
.venv/bin/python -c "
import pymysql
c = pymysql.connect(host='127.0.0.1', port=3307, user='root', database='scbench')
cur = c.cursor()
cur.execute('SELECT remaining FROM budget WHERE id=1')
print(f'Dolt OK, budget remaining: \${cur.fetchone()[0]}')
c.close()
"

# 3. Verify claude auth (console auth)
claude auth status 2>&1 | grep -q loggedIn || echo "WARNING: claude not authenticated"

# 4. Verify the pipeline CLI loads
.venv/bin/python research/runner/experiment_pipeline.py --help > /dev/null 2>&1 && echo "pipeline CLI OK"
```

If ANY check fails, escalate:
```bash
gt escalate --severity high --reason "Preflight failed: <details>"
```

Do NOT proceed if preflight fails."""
acceptance = "All 4 checks pass: deps, Dolt, auth, pipeline CLI"

[[steps]]
id = "run-pipeline"
title = "Run the full experiment pipeline"
description = """
Run experiment_pipeline.py — this single command does EVERYTHING:
- Runs the single-agent baseline via slop-code
- Runs the two-agent arm via two_agent_runner.py
- Evaluates both with slop-code eval
- Inserts results into Dolt experiments table
- Updates the budget table

```bash
REPO_ROOT="$(git rev-parse --show-toplevel)"
cd "$REPO_ROOT"

.venv/bin/python research/runner/experiment_pipeline.py \
  --problem {{problem_id}} \
  --model {{model}} \
  --budget {{total_budget_usd}} \
  --budget-split {{budget_split}} \
  --hypothesis-id {{hypothesis_id}} \
  --use-dolt
```

This will take 10-60 minutes depending on the problem.

**If it fails:** Read the error output carefully. Common issues:
- Docker not running → check `docker ps`
- Dolt not reachable → check `gt dolt status`
- Budget exhausted → pipeline will abort with message
- API errors → check claude auth status

**Do NOT try to run slop-code or two_agent_runner.py separately.**
The pipeline orchestrates both arms and handles all edge cases."""
acceptance = "Pipeline exits with code 0 and prints results summary"

[[steps]]
id = "verify-dolt"
title = "Verify results were written to Dolt"
description = """
Verify the pipeline actually wrote data to the experiments table.

```bash
REPO_ROOT="$(git rev-parse --show-toplevel)"
cd "$REPO_ROOT"

.venv/bin/python -c "
import pymysql
c = pymysql.connect(host='127.0.0.1', port=3307, user='root', database='scbench')
cur = c.cursor()

# Check for this experiment's rows
cur.execute(
    'SELECT problem_id, mode, total_pass_rate, total_cost '
    'FROM experiments WHERE hypothesis_id = %s '
    'ORDER BY mode',
    ('{{hypothesis_id}}',)
)
rows = cur.fetchall()
print(f'Found {len(rows)} rows for {{hypothesis_id}}:')
for r in rows:
    print(f'  {r[0]} {r[1]}: pass={r[2]}, cost=\${r[3]}')

# HARD CHECK: must have at least 2 rows (baseline + two-agent)
assert len(rows) >= 2, f'FAIL: expected >=2 rows, got {len(rows)}'

# HARD CHECK: costs must be non-zero
for r in rows:
    assert r[3] is not None and float(r[3]) > 0, \
        f'FAIL: cost is {r[3]} for {r[0]}/{r[1]}'

print('ALL CHECKS PASSED')
c.close()
"
```

**If checks fail:** Do NOT proceed. The experiment data is incomplete.
Re-run the pipeline or escalate."""
acceptance = ">=2 rows in Dolt with non-NULL, non-zero costs for this hypothesis_id"

[[steps]]
id = "research-report"
title = "Write research report and commit"
description = """
Write a structured report summarizing the experiment results.

```bash
REPO_ROOT="$(git rev-parse --show-toplevel)"
cd "$REPO_ROOT"
```

**1. Create report:**
```bash
mkdir -p research/experiments
```

Write to `research/experiments/{{hypothesis_id}}_report.md`:
- Hypothesis description
- Setup (problem, model, budget split)
- Results table (pass rate, cost, erosion, verbosity for each arm)
- Analysis (was the hypothesis supported?)
- Cost analysis
- Conclusion: SUPPORTED / REFUTED / INCONCLUSIVE

**2. Persist findings to bead:**
```bash
bd update {{hypothesis_id}} --design "<paste full report>"
bd update {{hypothesis_id}} --notes "Results: pass_rate_delta=X, cost=$Y. Conclusion: Z."
```

**3. Commit:**
```bash
git add research/experiments/{{hypothesis_id}}_report.md
git commit -m "experiment: {{hypothesis_id}} — <1-line result summary>"
```

**Exit criteria:** Report committed, findings in bead. Run gt done."""
acceptance = "Research report committed, findings written to bead design field"
