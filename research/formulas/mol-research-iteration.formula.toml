description = """
One iteration of the SCBench research loop. Runs orient → plan → \
red-team review → dispatch → analyze → chain-next as a polecat workflow.

IMPORTANT: Polecats cannot sling. For dispatch steps (red-team, experiments), \
mail the Mayor with exact commands. The Mayor dispatches immediately on \
receiving DISPATCH_REQUEST mail.

The chain-next step is a deterministic bash script that checks budget and \
mails the Mayor to sling the next iteration.

This formula is self-perpetuating via Mayor relay. The loop stops only when \
budget is exhausted (deterministic check, not LLM decision).

## DO NOT RUN EXPERIMENTS YOURSELF
You create experiment beads via gt formula pour, then ask the Mayor to sling \
them. You are the orchestrator, the Mayor is the dispatcher.
"""
formula = "mol-research-iteration"
type = "workflow"
version = 3

[[steps]]
id = "orient"
title = "Orient: Read state and plan experiments"
description = """
Reconstruct context and decide what experiments to run.

1. Read prior findings:
```bash
cat ~/gt/scbench/PRIOR_FINDINGS.md
```

2. Read research log for recent results:
```bash
bd show sc-research-log
```

3. Check budget:
```bash
cd ~/gt/.dolt-data/scbench && dolt sql -q "SELECT remaining FROM budget WHERE id = 1;"
```

4. Check recent experiment results:
```bash
cd ~/gt/.dolt-data/scbench && dolt sql -q "
  SELECT problem_id, mode, total_pass_rate, total_cost
  FROM experiments WHERE results_valid = 1
  ORDER BY id DESC LIMIT 20;
"
```

5. Check recent conclusions:
```bash
bd list --label conclusion
```

6. Check open hypotheses:
```bash
bd list --parent sc-hypotheses --status open
```

Based on all of this, decide what experiments to run next. \
Prioritize untested hypotheses and problems with gaps in coverage.
"""

[[steps]]
id = "plan"
title = "Plan experiment batch"
needs = ["orient"]
description = """
Create experiment beads (10-15) using gt formula pour.

For each experiment:
```bash
gt formula pour mol-scbench-experiment \
  --var problem_id=<problem> \
  --var model=local-sonnet-4.6 \
  --var hypothesis_id=<hyp-id> \
  --var hypothesis_description="<description>" \
  --var total_budget_usd=5 \
  --var budget_split=60
```

Create a batch summary bead:
```bash
bd create "Proposed Batch N: <summary>" \
  --label "batch" --parent sc-research-log \
  --description "Rationale: <why>
Experiments: <bead IDs and what they test>
Budget estimate: ~$X"
```

**Collect all experiment bead IDs** — you will need them for the dispatch step.

**Exit criteria**: Experiment beads created. Batch summary bead filed.
"""

[[steps]]
id = "red-team-review"
title = "Red Team: Adversarial review of batch design"
needs = ["plan"]
description = """
Create a Red Team review bead and mail the Mayor to dispatch it.

## Step 1: Create review bead

```bash
bd create "Red Team Review: Batch N" \
  --label "red-team-review" \
  --description "Review the proposed batch. File numbered objections."
```

## Step 2: Mail Mayor to dispatch the review

**Polecats cannot sling.** Mail the Mayor with exact commands:

```bash
gt mail send mayor/ \
  -s "DISPATCH_REQUEST: Red Team review" \
  -m "Please dispatch this review-only bead to a polecat:
gt sling <review-bead-id> scbench --review-only
Dispatch immediately, do not wait for confirmation."
```

## Step 3: Wait for review completion

Check mail for the review polecat's response:
```bash
gt mail inbox
bd show <review-bead-id>
```

## Step 4: Address objections and close the gate

Read objections. For each, accept or reject with justification:
```bash
bd note <review-bead-id> "Responses: ..."
bd close <review-bead-id>
```

**Exit criteria**: Review bead closed. All objections addressed.
"""

[[steps]]
id = "dispatch"
title = "Mail Mayor to dispatch experiments"
needs = ["red-team-review"]
description = """
Mail the Mayor with ALL experiment bead IDs in a single dispatch request.

**Polecats cannot sling.** The Mayor dispatches on your behalf.

```bash
gt mail send mayor/ \
  -s "DISPATCH_REQUEST: Batch N experiments" \
  -m "Please sling these experiment beads in ONE call:
gt sling <bead1> <bead2> <bead3> ... scbench
CRITICAL: One gt sling call = one convoy = auto-feed.
Dispatch immediately, do not wait for confirmation."
```

Log the dispatch request:
```bash
bd note sc-research-log "Iteration N: Requested dispatch of <N> experiments. \
Beads: <ids>. Mailed Mayor."
```

**Exit criteria**: Mayor mailed with all bead IDs.
"""

[[steps]]
id = "wait-and-analyze"
title = "Wait for experiments then analyze results"
needs = ["dispatch"]
description = """
Wait for experiments to complete, then analyze results.

## Waiting

Check progress periodically:
```bash
gt mail inbox
gt polecat list scbench
```

## Analysis (after experiments complete)

Query Dolt for the batch results:
```bash
cd ~/gt/.dolt-data/scbench && dolt sql -q "
  SELECT problem_id, mode, total_pass_rate, total_cost, budget_split
  FROM experiments
  WHERE results_valid = 1
  ORDER BY id DESC LIMIT 20;
"
```

Write a conclusion bead:
```bash
bd create "Conclusion: <key finding>" \
  --label "conclusion" --parent sc-research-log \
  --description "<analysis with data>"
```

Update the research log:
```bash
bd note sc-research-log "Iteration N analysis: <summary>"
```

**Exit criteria**: Conclusion bead filed. Research log updated.
"""

[[steps]]
id = "chain-next"
title = "Chain to next iteration (deterministic budget gate)"
needs = ["wait-and-analyze"]
description = """
Run the deterministic chain script. This checks budget and mails the \
Mayor to dispatch the next iteration (or shutdown if budget exhausted).

**YOU MUST RUN THIS SCRIPT. DO NOT SKIP IT.**

```bash
bash research/scripts/chain-next-iteration.sh
```

This script:
- Queries Dolt for budget remaining
- If remaining > $10: mails Mayor to create and sling next iteration
- If remaining <= $10: mails Mayor for shutdown

After running the script, run gt done to exit:
```bash
gt done
```

**Exit criteria**: chain-next-iteration.sh ran successfully. gt done executed.
"""
