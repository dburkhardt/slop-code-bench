description = """
One iteration of the SCBench research loop. Runs orient → plan → \
red-team review → dispatch → analyze → chain-next as a polecat workflow.

The red-team step dispatches an adversarial reviewer polecat that checks \
experiment design before budget is committed. The chain-next step is a \
deterministic bash script that checks budget and slings the next iteration.

This formula is self-perpetuating: each iteration dispatches the next \
one via chain-next-iteration.sh. The loop stops only when budget is \
exhausted (deterministic check, not LLM decision).

## DO NOT RUN EXPERIMENTS YOURSELF
You dispatch experiments to OTHER polecats via gt formula pour + gt sling. \
You are the orchestrator, not the executor.
"""
formula = "mol-research-iteration"
type = "workflow"
version = 2

[[steps]]
id = "orient"
title = "Orient: Read state and plan experiments"
description = """
Reconstruct context and decide what experiments to run.

1. Read prior findings:
```bash
cat ~/gt/scbench/PRIOR_FINDINGS.md
```

2. Read research log for recent results:
```bash
bd show sc-research-log
```

3. Check budget:
```bash
cd ~/gt/.dolt-data/scbench && dolt sql -q "SELECT remaining FROM budget WHERE id = 1;"
```

4. Check recent experiment results:
```bash
cd ~/gt/.dolt-data/scbench && dolt sql -q "
  SELECT problem_id, mode, total_pass_rate, total_cost
  FROM experiments WHERE results_valid = 1
  ORDER BY id DESC LIMIT 20;
"
```

5. Check recent conclusions:
```bash
bd list --label conclusion
```

6. Check open hypotheses:
```bash
bd list --parent sc-hypotheses --status open
```

Based on all of this, decide what experiments to run next. \
Prioritize untested hypotheses and problems with gaps in coverage.
"""

[[steps]]
id = "plan"
title = "Plan experiment batch"
needs = ["orient"]
description = """
Create a proposed batch bead with 10-15 experiments.

Pour experiment formulas (one per experiment):
```bash
gt formula pour mol-scbench-experiment \
  --var problem_id=<problem> \
  --var model=local-sonnet-4.6 \
  --var hypothesis_id=<hyp-id> \
  --var hypothesis_description="<description>" \
  --var total_budget_usd=5 \
  --var budget_split=60
```

Create a batch summary bead describing the rationale:
```bash
bd create "Proposed Batch N: <summary>" \
  --label "batch" \
  --parent sc-research-log \
  --description "Rationale: <why these experiments>
Experiments: <list of bead IDs and what they test>
Expected outcomes: <what we expect to learn>
Budget estimate: <N experiments * ~$5 = $X>"
```

**Exit criteria**: Experiment beads created. Batch summary bead filed.
Do NOT sling yet — Red Team reviews first.
"""

[[steps]]
id = "red-team-review"
title = "Red Team: Adversarial review of batch design"
needs = ["plan"]
description = """
Dispatch a Red Team review polecat to challenge the batch design. \
This is a BLOCKING gate — experiments do not dispatch until review passes.

## Step 1: Create review bead and block the batch

```bash
bd create "Red Team Review: Batch N" \
  --label "red-team-review" \
  --description "Review the proposed batch. File numbered objections. \
Consider: sample size sufficiency, confounding variables, budget waste, \
missing controls, whether this replicates known findings unnecessarily. \
Write objections as notes on this bead."

# Block batch until review closes
bd link <review-bead-id> <batch-bead-id> --type blocks

# Dispatch to a polecat (review-only, no code changes)
gt sling <review-bead-id> scbench --review-only \
  -m "Red Team review. Read the batch bead <batch-bead-id>. \
File objections as notes. Close the bead when done."
```

## Step 2: Wait for review (should take ~3-5 minutes)

Check for completion:
```bash
gt mail inbox
bd show <review-bead-id>
```

## Step 3: Address objections

Read the review bead notes. For each objection:
- **Accept**: Modify the batch (remove/replace experiments)
- **Reject with justification**: Explain why the objection doesn't apply

File your responses:
```bash
bd note <review-bead-id> "Responses: \
1. <objection 1>: <accept/reject + reasoning> \
2. <objection 2>: <accept/reject + reasoning>"
```

## Step 4: Close the gate

```bash
bd close <review-bead-id>
```

**Exit criteria**: Review bead closed. All objections addressed.
"""

[[steps]]
id = "dispatch"
title = "Dispatch experiments to polecats"
needs = ["red-team-review"]
description = """
Sling ALL experiment beads in a SINGLE gt sling call.

**CRITICAL**: One gt sling call = one convoy = auto-feed. \
Do NOT sling beads one at a time.

```bash
gt sling <bead1> <bead2> <bead3> ... scbench
```

Log the dispatch:
```bash
bd note sc-research-log "Iteration N: Dispatched <N> experiments. \
Beads: <ids>. Hypotheses: <list>."
```

**Exit criteria**: All experiment beads slung. Convoy created.
"""

[[steps]]
id = "wait-and-analyze"
title = "Wait for experiments then analyze results"
needs = ["dispatch"]
description = """
Wait for the experiment convoy to complete, then analyze results.

## Waiting

You will be notified via mail when the convoy lands. Check:
```bash
gt mail inbox
gt convoy list
```

If experiments are still running, check progress:
```bash
gt polecat list scbench
```

## Analysis (after experiments complete)

Query Dolt for the batch results:
```bash
cd ~/gt/.dolt-data/scbench && dolt sql -q "
  SELECT problem_id, mode, total_pass_rate, total_cost, budget_split
  FROM experiments
  WHERE results_valid = 1
  ORDER BY id DESC LIMIT 20;
"
```

Write a brief analysis as a conclusion bead:
```bash
bd create "Conclusion: <key finding>" \
  --label "conclusion" \
  --parent sc-research-log \
  --description "<analysis with data>"
```

Update the research log:
```bash
bd note sc-research-log "Iteration N analysis: <summary of findings>"
```

**Exit criteria**: Conclusion bead filed. Research log updated.
"""

[[steps]]
id = "chain-next"
title = "Chain to next iteration (deterministic budget gate)"
needs = ["wait-and-analyze"]
description = """
Run the deterministic chain script. This checks budget in Dolt and \
either dispatches the next iteration or notifies the Mayor for shutdown.

**YOU MUST RUN THIS SCRIPT. DO NOT SKIP IT.**

```bash
bash research/scripts/chain-next-iteration.sh
```

This script:
- Queries Dolt for budget remaining
- If remaining > $10: creates next iteration bead and slings it
- If remaining <= $10: mails Mayor for shutdown

After running the script, run gt done to exit:
```bash
gt done
```

**Exit criteria**: chain-next-iteration.sh ran successfully. gt done executed.
"""
