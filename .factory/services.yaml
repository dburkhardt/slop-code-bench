commands:
  install: cd /home/ubuntu/git-repos/slop-code-bench && uv sync
  test: cd /home/ubuntu/git-repos/slop-code-bench && uv run pytest tests/runner/ tests/analysis/ -q --no-header 2>/dev/null || uv run pytest tests/runner/ -q --no-header
  lint: cd /home/ubuntu/git-repos/slop-code-bench && if [ -d tests/analysis ]; then uv run ruff check research/ tests/runner/ tests/analysis/ .factory/; else uv run ruff check research/ tests/runner/ .factory/; fi
  typecheck: "echo 'typecheck: skipped (upstream src/ has pre-existing type errors unrelated to this mission)'"
  format_imports: cd /home/ubuntu/git-repos/slop-code-bench && uv run isort research/ tests/runner/ tests/analysis/
  lint_debug: cd /home/ubuntu/git-repos/slop-code-bench && uv run ruff check research/debug/ src/slop_code/agent_runner/agents/cli_utils.py src/slop_code/agent_runner/agents/claude_code/agent.py

services:
  dolt:
    start: ss -ltn | grep -q ':3307 ' || (cd ~/gt/.dolt-data/scbench && nohup dolt sql-server --port 3307 >/tmp/dolt-sql-server.log 2>&1 &)
    stop: lsof -ti :3307 | xargs -r kill
    healthcheck: cd ~/gt/.dolt-data/scbench && dolt sql -q "SELECT 1;"
    port: 3307
    depends_on: []
