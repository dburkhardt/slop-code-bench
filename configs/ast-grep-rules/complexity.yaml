---
id: chained-comparison-opportunity
language: python
severity: warning
message: Use chained comparison (e.g., a < b < c) instead of 'and'
metadata:
  weight: 3
  category: complexity
rule:
  kind: boolean_operator
  any:
  - pattern: $A < $B and $B < $C
  - pattern: $A > $B and $B > $C
  - pattern: $A <= $B and $B <= $C
  - pattern: $A >= $B and $B >= $C
  - pattern: $A < $B and $B <= $C
  - pattern: $A <= $B and $B < $C
  - pattern: $A > $B and $B >= $C
  - pattern: $A >= $B and $B > $C
---
id: chained-dict-get
language: python
severity: warning
message: Chained .get().get() - overly defensive, extract to helper
metadata:
  weight: 3
  category: complexity
rule:
  kind: call
  has:
    kind: attribute
    has:
      kind: call
      has:
        kind: attribute
        regex: \.get$
    regex: \.get$
---
id: comprehension-used-but-ignored-result
language: python
severity: warning
message: Comprehension result is never used - this looks like a side-effect-only comprehension
metadata:
  weight: 3
  category: complexity
rule:
  kind: expression_statement
  has:
    any:
    - kind: list_comprehension
    - kind: set_comprehension
    - kind: dictionary_comprehension
    - kind: generator_expression
---
id: constant-condition-if
language: python
severity: warning
message: Constant condition in if - dead code or unnecessary branching
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  any:
  - pattern: 'if True: $$$'
  - pattern: 'if False: $$$'
  - pattern: 'if None: $$$'
  - pattern: 'if 0: $$$'
  - pattern: 'if 1: $$$'
---
id: duplicated-if-condition
language: python
severity: warning
message: Duplicated if condition in elif chain
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  pattern: "if $COND:\n  $$$\nelif $COND:\n  $$$\n"
---
id: excessive-nested-loops
language: python
severity: warning
message: Triple nested loops - O(n^3) complexity, consider refactoring
metadata:
  weight: 3
  category: complexity
rule:
  kind: for_statement
  has:
    kind: block
    has:
      kind: for_statement
      has:
        kind: block
        has:
          kind: for_statement
---
id: function-too-many-args
language: python
severity: warning
message: Function with 10+ arguments - consider using a data object
metadata:
  weight: 3
  category: complexity
rule:
  kind: function_definition
  has:
    kind: parameters
    has:
      nthChild:
        position: 10
---
id: isinstance-chain
language: python
severity: warning
message: Multiple isinstance checks - consider using isinstance with tuple
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  has:
    kind: elif_clause
    has:
      kind: call
      regex: isinstance
---
id: isinstance-return-ladder
language: python
severity: warning
message: Long isinstance/elif ladder returning simple values; prefer a dispatch table
  or polymorphism.
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "if isinstance($X, $T1):\n  return $V1\nelif isinstance($X, $T2):\n  return\
    \ $V2\n"
---
id: manual-min-max
language: python
severity: warning
message: Manual min/max logic - use built-in min() or max()
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  any:
  - pattern: "if $A > $B:\n  $M = $A\nelse:\n  $M = $B\n"
  - pattern: "if $A < $B:\n  $M = $A\nelse:\n  $M = $B\n"
  - pattern: "if $A >= $B:\n  $M = $A\nelse:\n  $M = $B\n"
  - pattern: "if $A <= $B:\n  $M = $A\nelse:\n  $M = $B\n"
---
id: manual-str-join
language: python
severity: warning
message: Augmented assignment in loop - if building a string, use ''.join()
metadata:
  weight: 3
  category: complexity
rule:
  kind: for_statement
  has:
    kind: block
    has:
      kind: expression_statement
      has:
        kind: augmented_assignment
        pattern: $S += $X
---
id: nested-function-definition
language: python
severity: warning
message: Nested function definition - often unnecessary closure
metadata:
  weight: 3
  category: complexity
rule:
  kind: function_definition
  has:
    kind: block
    has:
      kind: function_definition
---
id: nested-if-no-else
language: python
severity: warning
message: Nested if statements without else - consider flattening or combining conditions
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  has:
    kind: block
    has:
      kind: if_statement
      not:
        has:
          kind: else_clause
---
id: pointless-lambda-call
language: python
severity: warning
message: Immediately called lambda - just execute the code
metadata:
  weight: 3
  category: complexity
rule:
  kind: call
  has:
    kind: parenthesized_expression
    has:
      kind: lambda
---
id: repeated-dict-key-assignment
language: python
severity: warning
message: Repeated dict[key] = func(...) pattern - consider loop or dict comprehension
metadata:
  weight: 3
  category: complexity
rule:
  kind: expression_statement
  has:
    kind: assignment
    pattern: $DICT[$KEY] = $FUNC($$$)
  follows:
    kind: expression_statement
    has:
      kind: assignment
      pattern: $DICT[$KEY2] = $FUNC($$$)
---
id: repeated-if-continue
language: python
severity: warning
message: Multiple if-continue guards - consider list comprehension or filter function
metadata:
  weight: 3
  category: complexity
rule:
  kind: for_statement
  has:
    kind: block
    has:
      kind: if_statement
      has:
        kind: block
        has:
          kind: continue_statement
      follows:
        kind: if_statement
        has:
          kind: block
          has:
            kind: continue_statement
---
id: repeated-if-return-error
language: python
severity: warning
message: Multiple if-return error checks - consolidate validation logic
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  has:
    kind: block
    has:
      kind: return_statement
      regex: error|Error|ERROR
  follows:
    kind: if_statement
    has:
      kind: block
      has:
        kind: return_statement
        regex: error|Error|ERROR
---
id: repeated-try-except
language: python
severity: warning
message: Sequential try/except blocks - consolidate error handling
metadata:
  weight: 3
  category: complexity
rule:
  kind: try_statement
  follows:
    kind: try_statement
---
id: repeated-validation-calls
language: python
severity: warning
message: Repeated validation function calls - consider data-driven validation
metadata:
  weight: 3
  category: complexity
rule:
  kind: expression_statement
  has:
    kind: call
    regex: ^validate_
  follows:
    kind: expression_statement
    has:
      kind: call
      regex: ^validate_
---
id: ternary-same-value
language: python
severity: warning
message: Ternary returns same value for both branches - remove condition
metadata:
  weight: 3
  category: complexity
rule:
  kind: conditional_expression
  pattern: $VALUE if $COND else $VALUE
---
id: too-many-returns
language: python
severity: warning
message: Function with 9+ return statements - hard to reason about control flow
metadata:
  weight: 3
  category: complexity
rule:
  kind: function_definition
  has:
    kind: block
    has:
      kind: return_statement
      nthChild:
        position: 9
---
id: triple-nested-if
language: python
severity: warning
message: Triple nested if - flatten or extract function
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  has:
    kind: block
    has:
      kind: if_statement
      has:
        kind: block
        has:
          kind: if_statement
---
id: triple-or-condition
language: python
severity: warning
message: Triple OR condition - may indicate need for membership test
metadata:
  weight: 3
  category: complexity
rule:
  kind: boolean_operator
  pattern: $A or $B or $C
---
id: repeated-function-or-chain
language: python
severity: warning
message: Same function called 4+ times with 'or' - use any(func(x) for x in [...])
metadata:
  weight: 3
  category: complexity
rule:
  kind: boolean_operator
  pattern: $F($$$A) or $F($$$B) or $F($$$C) or $F($$$D)
---
id: type-check-instead-of-isinstance
language: python
severity: warning
message: type(x) is T - use isinstance(x, T) to support inheritance
metadata:
  weight: 3
  category: complexity
rule:
  kind: comparison_operator
  pattern: type($X) is $T
---
id: useless-try-except
language: python
severity: warning
message: Useless try-except - re-raising the exception without handling it
metadata:
  weight: 3
  category: complexity
rule:
  kind: try_statement
  has:
    kind: except_clause
    has:
      kind: block
      all:
      - has:
          kind: raise_statement
          regex: ^raise$
      - not:
          has:
            kind: expression_statement
---
id: value-compare-return-ladder
language: python
severity: warning
message: Long value comparison ladder returning literals; prefer a dispatch map or
  dict lookup with a default.
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  pattern: "if $X == $V1:\n  return $R1\nelif $X == $V2:\n  return $R2\nelif $X ==\
    \ $V3:\n  return $R3\n"
  not:
    has:
      kind: else_clause
---
id: redundant-else-after-exit
language: python
severity: warning
message: else after return/raise is redundant - remove unnecessary indentation
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  any:
  - pattern: "if $COND:\n  return $VAL\nelse:\n  $$$\n"
  - pattern: "if $COND:\n  raise $E\nelse:\n  $$$\n"
---
id: dynamic-code-execution
language: python
severity: warning
message: exec/eval usage is opaque and risky - avoid dynamic code execution
metadata:
  weight: 3
  category: complexity
rule:
  kind: call
  any:
  - pattern: exec($$$)
  - pattern: eval($$$)
---
id: global-statement
language: python
severity: warning
message: global statements hide dependencies and state coupling
metadata:
  weight: 3
  category: complexity
rule:
  kind: global_statement
---
id: nonlocal-anywhere
language: python
severity: warning
message: nonlocal usage tangles scopes - prefer explicit parameters
metadata:
  weight: 3
  category: complexity
rule:
  kind: nonlocal_statement
---
id: boolean-chain-four-and
language: python
severity: warning
message: Boolean chain with 4+ terms - consider extracting to helper or variable
metadata:
  weight: 3
  category: complexity
rule:
  kind: boolean_operator
  pattern: $A and $B and $C and $D
---
id: assert-false-sentinel
language: python
severity: warning
message: assert False used as a control gate is opaque; use explicit errors
metadata:
  weight: 3
  category: complexity
rule:
  pattern: assert False
---
id: equality-or-chain-four
language: python
severity: warning
message: Long equality OR chain - use membership checks or dispatch maps
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "if $X == $A or $X == $B or $X == $C or $X == $D:\n  $$$\n"
---
id: state-ladder
language: python
severity: warning
message: State comparison ladder - consider using enum/dispatch pattern
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  pattern: "if $STATE == $S1:\n  $$$\nelif $STATE == $S2:\n  $$$\nelif $STATE == $S3:\n\
    \  $$$\n"
---
id: repetitive-list-append-elif
language: python
severity: warning
message: Appending to the same list across elifs reads like copy/paste - refactor
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "if $C1:\n  $L.append($A)\nelif $C2:\n  $L.append($B)\nelif $C3:\n  $L.append($C)\n"
---
id: import-inside-function
language: python
severity: warning
message: Imports inside functions hide dependencies and reload modules repeatedly
metadata:
  weight: 3
  category: complexity
rule:
  kind: function_definition
  has:
    kind: block
    has:
      any:
      - kind: import_statement
      - kind: import_from_statement
---
id: bare-except-pass
language: python
severity: warning
message: Bare except with pass swallows every error - handle specific cases
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "try:\n  $$$\nexcept:\n  pass\n"
---
id: broad-except-return-none
language: python
severity: warning
message: Returning None from a broad except hides the real failure
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "try:\n  $$$\nexcept Exception:\n  return None\n"
---
id: monolithic-module
language: python
severity: warning
message: File with 200+ top-level statements - split into modules
metadata:
  weight: 3
  category: complexity
rule:
  kind: module
  has:
    nthChild:
      position: 200
---
id: oversized-function-body
language: python
severity: warning
message: Function with 60+ statements is hard to follow - extract helpers
metadata:
  weight: 3
  category: complexity
rule:
  kind: function_definition
  has:
    kind: block
    has:
      nthChild:
        position: 60
---
id: class-too-many-members
language: python
severity: warning
message: Class with 25+ members becomes an unreadable God object
metadata:
  weight: 3
  category: complexity
rule:
  kind: class_definition
  has:
    kind: block
    has:
      nthChild:
        position: 25
---
id: five-elif-ladder
language: python
severity: warning
message: Long elif ladder - use a dispatch dict or map for clarity
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  has:
    kind: elif_clause
    nthChild:
      position: 4
---
id: manual-path-concat
language: python
severity: warning
message: Manual string path concatenation - use pathlib or os.path.join
metadata:
  weight: 3
  category: complexity
rule:
  kind: binary_operator
  regex: \+\s*["']/["']\s*\+
---
id: nested-try-in-except
language: python
severity: warning
message: try inside an except makes control flow opaque - refactor error handling
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "try:\n  $$$\nexcept $E:\n  try:\n    $$$\n  except $F:\n    $$$\n"
---
id: lambda-nested-ternary
language: python
severity: warning
message: Lambda containing a ternary is dense; use a named function
metadata:
  weight: 3
  category: complexity
rule:
  kind: lambda
  has:
    kind: conditional_expression
---
id: import-inside-loop
language: python
severity: warning
message: Imports inside loops add hidden side effects and slow iterations
metadata:
  weight: 3
  category: complexity
rule:
  kind: for_statement
  has:
    kind: block
    has:
      any:
      - kind: import_statement
      - kind: import_from_statement
---
id: reraise-same-exception
language: python
severity: warning
message: Re-raising the caught exception object drops traceback; use bare raise
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "try:\n  $$$\nexcept Exception as $E:\n  raise $E\n"
---
id: try-finally-pass
language: python
severity: warning
message: try/finally with pass in finally hides missing cleanup
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "try:\n  $$$\nfinally:\n  pass\n"
---
id: for-range-len
language: python
severity: warning
message: range(len(seq)) loop suggests index juggling; prefer enumerate
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "for $I in range(len($SEQ)):\n  $$$\n"
---
id: catch-baseexception
language: python
severity: warning
message: Catching BaseException traps system exits and interrupts
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "try:\n  $$$\nexcept BaseException:\n  $$$\n"
---
id: except-exception-return-literal
language: python
severity: warning
message: Returning a literal from broad except masks the real failure
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "try:\n  $$$\nexcept Exception:\n  return $LIT\n"
---
id: deep-nested-with
language: python
severity: warning
message: Four-level nested with statements are dense; combine or extract helpers
metadata:
  weight: 3
  category: complexity
rule:
  kind: with_statement
  has:
    kind: block
    has:
      kind: with_statement
      has:
        kind: block
        has:
          kind: with_statement
          has:
            kind: block
            has:
              kind: with_statement
---
id: boolean-return-if-else
language: python
severity: warning
message: if/else returning True/False - simplify to return the condition directly
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  any:
  - pattern: "if $COND:\n  return True\nelse:\n  return False\n"
  - pattern: "if $COND:\n  return False\nelse:\n  return True\n"
---
id: json-dumps-then-loads
language: python
severity: warning
message: json.loads(json.dumps(x)) is noisy; copy the structure directly
metadata:
  weight: 3
  category: complexity
rule:
  pattern: json.loads(json.dumps($X))
---
id: lambda-default-argument
language: python
severity: warning
message: Default argument as a lambda is surprising implicit behavior
metadata:
  weight: 3
  category: complexity
rule:
  kind: function_definition
  has:
    kind: parameters
    has:
      kind: default_parameter
      has:
        kind: lambda
---
id: function-too-many-ifs
language: python
severity: warning
message: Function with 10+ if statements is a branchy maze
metadata:
  weight: 3
  category: complexity
rule:
  kind: function_definition
  has:
    kind: block
    has:
      kind: if_statement
      nthChild:
        position: 10
---
id: chained-assignment
language: python
severity: warning
message: Chained assignment a = b = c obscures source of values
metadata:
  weight: 3
  category: complexity
rule:
  pattern: $A = $B = $C
---
id: call-too-many-positional-args
language: python
severity: warning
message: Call with 10+ positional args is hard to read; use kwargs or objects
metadata:
  weight: 3
  category: complexity
rule:
  kind: call
  has:
    kind: argument_list
    has:
      nthChild:
        position: 10
---
id: pointless-bool-cast
language: python
severity: warning
message: Wrapping a condition in bool() before if is redundant ceremony
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  pattern: "if bool($COND):\n  $$$\n"
---
id: list-filter-none
language: python
severity: warning
message: list(filter(None, ...)) obscures the predicate; use comprehension
metadata:
  weight: 3
  category: complexity
rule:
  pattern: list(filter(None, $ITER))
---
id: single-call-wrapper
language: python
severity: warning
message: Function body is just 'return func(...)' - trivial wrapper adds indirection
metadata:
  weight: 3
  category: complexity
rule:
  pattern: "def $NAME($$$ARGS):\n  return $FUNC($$$CALL_ARGS)\n"
---
id: empty-abstract-base
language: python
severity: warning
message: ABC class with no @abstractmethod - just a regular class with ABC inheritance
metadata:
  weight: 3
  category: complexity
rule:
  kind: class_definition
  has:
    kind: argument_list
    has:
      kind: identifier
      regex: ^ABC$
  not:
    has:
      kind: block
      has:
        kind: decorated_definition
        has:
          kind: decorator
          regex: '@abstractmethod'
---
id: env-based-branching
language: python
severity: warning
message: Conditional on environment variable buried in logic - extract to config
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  has:
    kind: call
    any:
    - pattern: os.environ.get($$$)
    - pattern: os.getenv($$$)
    - pattern: os.environ[$KEY]
---
id: silent-value-clamping
language: python
severity: warning
message: Value clamping with min/max without logging - silently adjusts out-of-range
  values
metadata:
  weight: 3
  category: complexity
rule:
  any:
  - pattern: max($A, min($B, $C))
  - pattern: min(max($A, $B), $C)
  - pattern: min($A, max($B, $C))
  - pattern: max(min($A, $B), $C)
---
id: decorator-chain-three-plus
language: python
severity: warning
message: Function has 3+ decorators - consider composing into single decorator
metadata:
  weight: 3
  category: complexity
rule:
  kind: decorated_definition
  has:
    kind: decorator
    nthChild:
      position: 3
---
id: consecutive-if-same-variable
language: python
severity: warning
message: Consecutive if statements checking same variable - should use elif for efficiency
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  has:
    kind: comparison_operator
    has:
      kind: identifier
      pattern: $VAR
  follows:
    kind: if_statement
    all:
    - has:
        kind: comparison_operator
        has:
          kind: identifier
          pattern: $VAR
    - has:
        kind: block
        has:
          kind: return_statement
    stopBy: neighbor
---
id: excessive-method-chain
language: python
severity: warning
message: Excessive method chaining (4+ calls) - extract intermediate variables for
  readability
metadata:
  weight: 3
  category: complexity
rule:
  kind: call
  has:
    kind: attribute
    has:
      kind: call
      has:
        kind: attribute
        has:
          kind: call
          has:
            kind: attribute
            has:
              kind: call
---
id: nested-attribute-guard-chain
language: python
severity: warning
message: 'Nested attribute guard chain (if x: if x.y: if x.y.z:) - use walrus operator
  or getattr'
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  all:
  - has:
      kind: identifier
      pattern: $OBJ
  - has:
      kind: block
      has:
        kind: if_statement
        all:
        - has:
            kind: attribute
            has:
              kind: identifier
              pattern: $OBJ
        - has:
            kind: block
            has:
              kind: if_statement
---
id: repeated-isinstance-validation
language: python
severity: warning
message: Repeated isinstance validation pattern - extract to validation helper or
  use schema
metadata:
  weight: 3
  category: complexity
rule:
  kind: if_statement
  all:
  - has:
      kind: not_operator
      has:
        kind: call
        pattern: isinstance($VAR, $TYPE)
  - has:
      kind: block
      has:
        kind: raise_statement
  follows:
    kind: if_statement
    all:
    - has:
        kind: not_operator
        has:
          kind: call
          regex: isinstance
    - has:
        kind: block
        has:
          kind: raise_statement
    stopBy: neighbor
---
id: split-magic-index
language: python
severity: warning
message: String split with magic index - extract to named variable or use unpacking
metadata:
  weight: 3
  category: complexity
rule:
  kind: subscript
  all:
  - has:
      kind: call
      has:
        kind: attribute
        regex: \.split$
  - has:
      kind: integer
      regex: ^[2-9]|[1-9][0-9]+$
---
id: many-exception-types
language: python
severity: warning
message: Catching 4+ exception types suggests overly broad error handling - consider
  restructuring
metadata:
  weight: 3
  category: complexity
rule:
  kind: except_clause
  has:
    kind: tuple
    has:
      nthChild:
        position: 4
---
id: isinstance-or-chain-validation
language: python
severity: warning
message: Chained isinstance checks with 'or not' - consider schema validation or type
  guards
metadata:
  weight: 3
  category: complexity
rule:
  kind: boolean_operator
  regex: not isinstance.*or.*not isinstance
---
id: return-empty-collection-pair
language: python
severity: warning
message: Returning pair of empty collections - consider returning a named tuple or
  dataclass
metadata:
  weight: 3
  category: complexity
rule:
