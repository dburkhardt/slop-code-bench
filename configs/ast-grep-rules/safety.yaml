---
id: assert-false-unreachable
language: python
severity: warning
message: assert False for unreachable code - use raise instead
metadata:
  weight: 4
  category: safety
rule:
  kind: assert_statement
  regex: assert\s+False
---
id: catch-base-exception
language: python
severity: warning
message: Catching base Exception class - catch specific exceptions instead
metadata:
  weight: 4
  category: safety
rule:
  kind: except_clause
  has:
    kind: identifier
    regex: ^Exception$
---
id: bare-except-no-reraise
language: python
severity: warning
message: Bare except without re-raise hides errors; catch specific exceptions or re-raise.
metadata:
  weight: 4
  category: safety
rule:
  kind: except_clause
  pattern: "except:\n  $BODY\n"
  not:
    has:
      kind: raise_statement
---
id: bare-raise
language: python
severity: warning
message: Bare raise outside except block - may hide original exception
metadata:
  weight: 4
  category: safety
rule:
  kind: raise_statement
  regex: ^raise$
  not:
    inside:
      kind: except_clause
---
id: double-if-none-guard
language: python
severity: warning
message: Duplicate None guard on the same variable; handle the None case once.
metadata:
  weight: 4
  category: safety
rule:
  kind: if_statement
  pattern: "if $X is None:\n  $$$\n"
  follows:
    kind: if_statement
    pattern: "if $X is None:\n  $$$\n"
---
id: except-pass
language: python
severity: warning
message: 'except: pass - silently swallowing errors'
metadata:
  weight: 4
  category: safety
rule:
  kind: except_clause
  has:
    kind: block
    has:
      kind: pass_statement
---
id: if-elif-raise-no-else
language: python
severity: warning
message: if/elif raising in each branch but no else leaves silent pass-through; add
  an explicit fallback.
metadata:
  weight: 4
  category: safety
rule:
  kind: if_statement
  pattern: "if $COND1:\n  raise $ERR1\nelif $COND2:\n  raise $ERR2\n"
  not:
    has:
      kind: else_clause
---
id: if-elif-return-no-else
language: python
severity: warning
message: if/elif returns without an else may fall through and return None unexpectedly.
metadata:
  weight: 4
  category: safety
rule:
  kind: if_statement
  pattern: "if $COND1:\n  return $A\nelif $COND2:\n  return $B\n"
  not:
    has:
      kind: else_clause
---
id: is-bool-literal
language: python
severity: warning
message: '''is True'' or ''is False'' check - use truthiness or equality if necessary'
metadata:
  weight: 4
  category: safety
rule:
  kind: comparison_operator
  regex: \s+is\s+(True|False)
---
id: mutable-default-arg
language: python
severity: warning
message: Mutable default argument - dangerous pattern, use None as default
metadata:
  weight: 4
  category: safety
rule:
  kind: function_definition
  has:
    kind: parameters
    has:
      kind: default_parameter
      any:
      - has:
          kind: list
      - has:
          kind: dictionary
      - has:
          kind: set
---
id: open-without-context
language: python
severity: warning
message: open() without context manager - use 'with open(...) as f' to ensure file
  closure
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  has:
    kind: identifier
    regex: ^open$
  not:
    inside:
      kind: with_item
---
id: optional-path-fallback-cwd
language: python
severity: warning
message: Falling back to Path() when a base path is None can write to CWD unexpectedly;
  require an explicit base.
metadata:
  weight: 4
  category: safety
rule:
  kind: assignment
  pattern: $BASE = $ROOT if $ROOT is not None else Path()
---
id: parser-while-true-no-break
language: python
severity: warning
message: while True loop without a break/raise in a parser can hang on malformed input;
  add termination.
metadata:
  weight: 4
  category: safety
rule:
  kind: while_statement
  pattern: "while True:\n  $BODY\n"
  not:
    any:
    - has:
        kind: break_statement
    - has:
        kind: raise_statement
---
id: path-missing-return-empty
language: python
severity: warning
message: Returning [] when a path is missing silently hides configuration errors;
  raise or log instead.
metadata:
  weight: 4
  category: safety
rule:
  kind: if_statement
  pattern: "if not $P.exists() or not $P.is_dir():\n  return []\n"
---
id: shadowing-builtin
language: python
severity: warning
message: Shadowing builtin name - avoid using list, dict, str, int as variable names
metadata:
  weight: 4
  category: safety
rule:
  kind: assignment
  pattern: $NAME = $VALUE
constraints:
  NAME:
    regex: ^(list|dict|str|int|float|bool|set|tuple|object|map|filter|sum|min|max|type)$
---
id: string-none-check
language: python
severity: warning
message: Checking for string literal 'None' - suggests CSV parsing edge case handling
metadata:
  weight: 4
  category: safety
rule:
  pattern: $VAR == 'None'
---
id: subprocess-shell-true
language: python
severity: warning
message: subprocess call with shell=True - security risk (injection)
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  has:
    kind: argument_list
    has:
      kind: keyword_argument
      regex: shell\s*=\s*True
---
id: sys-exit-outside-main
language: python
severity: warning
message: sys.exit called outside main/CLI parsing; raise exceptions instead of exiting
  deep in the stack.
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  pattern: sys.exit($ARG)
  not:
    inside:
      kind: if_statement
      pattern: 'if __name__ == "__main__": $$$'
---
id: try-except-bare-log
language: python
severity: warning
message: Bare except logging and suppressing errors makes debugging hard; catch specific
  exceptions or re-raise.
metadata:
  weight: 4
  category: safety
rule:
  kind: try_statement
  pattern: "try:\n  $$$\nexcept Exception as $E:\n  $LOGGER.$LEVEL($MSG)\n"
---
id: try-except-continue
language: python
severity: warning
message: 'Swallowing all exceptions with `except Exception: continue` hides real errors;
  handle explicitly.'
metadata:
  weight: 4
  category: safety
rule:
  kind: try_statement
  pattern: "try:\n  $$$\nexcept Exception:\n  continue\n"
---
id: try-except-typeerror
language: python
severity: warning
message: try-except TypeError block - often over-defensive error handling
metadata:
  weight: 4
  category: safety
rule:
  kind: try_statement
  has:
    kind: except_clause
    regex: except TypeError
---
id: try-except-valueerror
language: python
severity: warning
message: try-except ValueError block - often over-defensive error handling
metadata:
  weight: 4
  category: safety
rule:
  kind: try_statement
  has:
    kind: except_clause
    regex: except ValueError
---
id: wildcard-import
language: python
severity: warning
message: Wildcard import (from module import *) - pollutes namespace and obscures
  dependencies
metadata:
  weight: 4
  category: safety
rule:
  kind: import_from_statement
  regex: import\s+\*$
---
id: validate-should-raise
language: python
severity: warning
message: validate* helpers that perform checks but never raise can hide failures;
  raise or propagate an error.
metadata:
  weight: 4
  category: safety
rule:
  kind: function_definition
  has:
    kind: identifier
    regex: ^validate
  not:
    has:
      kind: block
      has:
        kind: raise_statement
---
id: assert-in-production-code
language: python
severity: warning
message: assert statement can be stripped in production (-O flag) - use explicit validation
metadata:
  weight: 4
  category: safety
rule:
  kind: assert_statement
---
id: hardcoded-path
language: python
severity: warning
message: Hardcoded absolute path - use configuration or environment variable
metadata:
  weight: 4
  category: safety
rule:
  kind: string
  regex: ^['"]/(home|usr|var|tmp|etc)/
---
id: hardcoded-localhost
language: python
severity: warning
message: Hardcoded localhost URL - use configuration or environment variable
metadata:
  weight: 4
  category: safety
rule:
  kind: string
  regex: (localhost|127\.0\.0\.1):\d+
---
id: dataclass-no-validation
language: python
severity: warning
message: Dataclass without __post_init__ validation - consider adding field validation
metadata:
  weight: 4
  category: safety
rule:
  kind: decorated_definition
  all:
  - has:
      kind: decorator
      has:
        kind: identifier
        regex: ^dataclass$
  - has:
      kind: class_definition
      not:
        has:
          kind: block
          has:
            kind: function_definition
            has:
              kind: identifier
              regex: ^__post_init__$
---
id: catch-reraise-no-from
language: python
severity: warning
message: Re-raising new exception without 'from' loses original traceback context
metadata:
  weight: 4
  category: safety
rule:
  kind: except_clause
  all:
  - has:
      kind: as_pattern
  - has:
      kind: block
      has:
        kind: raise_statement
        has:
          kind: call
        not:
          regex: \bfrom\b
---
id: except-return-false
language: python
severity: warning
message: Returning False from except block hides the actual error
metadata:
  weight: 4
  category: safety
rule:
  kind: except_clause
  has:
    kind: block
    has:
      kind: return_statement
      has:
        kind: 'false'
---
id: except-return-empty-string
language: python
severity: warning
message: Returning empty string from except block hides the actual error
metadata:
  weight: 4
  category: safety
rule:
  kind: except_clause
  has:
    kind: block
    has:
      kind: return_statement
      has:
        kind: string
        regex: ^['"]"?'?$
---
id: yaml-unsafe-load
language: python
severity: warning
message: yaml.load without Loader is unsafe - use yaml.safe_load or specify Loader
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  pattern: yaml.load($X)
  not:
    has:
      kind: argument_list
      has:
        kind: keyword_argument
        regex: Loader
---
id: fstring-sql-injection
language: python
severity: warning
message: f-string in SQL query - use parameterized queries to prevent injection
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  all:
  - has:
      kind: attribute
      regex: \.(execute|executemany)$
  - has:
      kind: argument_list
      has:
        kind: string
        regex: ^f['"]
---
id: format-sql-injection
language: python
severity: warning
message: .format() in SQL query - use parameterized queries to prevent injection
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  all:
  - has:
      kind: attribute
      regex: \.(execute|executemany)$
  - has:
      kind: argument_list
      has:
        kind: call
        has:
          kind: attribute
          regex: \.format$
---
id: regex-without-raw-string
language: python
severity: warning
message: re.compile() without raw string - escape sequences may be interpreted incorrectly
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  all:
  - has:
      kind: attribute
      pattern: re.compile
  - has:
      kind: argument_list
      has:
        kind: string
        not:
          regex: ^r['"]
---
id: raise-runtime-error
language: python
severity: warning
message: Raising RuntimeError - use a more specific exception type
metadata:
  weight: 4
  category: safety
rule:
  kind: raise_statement
  has:
    kind: call
    has:
      kind: identifier
      regex: ^RuntimeError$
---
id: pickle-load-untrusted
language: python
severity: warning
message: pickle.load is unsafe for untrusted data - consider json or other safe formats
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  any:
  - pattern: pickle.load($X)
  - pattern: pickle.loads($X)
---
id: eval-input-data
language: python
severity: warning
message: eval() on variable data is a security risk - use ast.literal_eval or json
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  all:
  - has:
      kind: identifier
      regex: ^eval$
  - has:
      kind: argument_list
      has:
        kind: identifier
---
id: os-system-call
language: python
severity: warning
message: os.system() is unsafe - use subprocess with shell=False
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  pattern: os.system($CMD)
---
id: tempfile-without-delete
language: python
severity: warning
message: NamedTemporaryFile without delete=False may delete file while still in use
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  pattern: tempfile.NamedTemporaryFile($$$)
  not:
    has:
      kind: argument_list
      has:
        kind: keyword_argument
        regex: delete
---
id: exec-untrusted
language: python
severity: warning
message: exec() is a security risk - avoid executing dynamic code
metadata:
  weight: 4
  category: safety
rule:
  kind: call
  all:
  - has:
      kind: identifier
      regex: ^exec$
  - has:
      kind: argument_list
      has:
        kind: identifier
---
id: raise-bare-exception
language: python
severity: warning
message: Raising bare Exception - use a more specific exception type
metadata:
  weight: 4
  category: safety
rule:
  kind: raise_statement
  has:
    kind: call
    has:
      kind: identifier
      regex: ^Exception$
---
id: catch-specific-reraise
language: python
severity: warning
message: Catching exception only to re-raise unchanged - the except clause is a no-op,
  remove it
metadata:
  weight: 4
  category: safety
rule:
  kind: except_clause
  all:
  - has:
      any:
      - kind: identifier
      - kind: attribute
  - not:
      has:
        kind: as_pattern
  - has:
      kind: block
      all:
      - has:
          kind: raise_statement
          regex: ^raise$
      - not:
          has:
            nthChild:
              position: 2
              ofRule:
                not:
                  kind: comment
