---
id: type-in-name
language: python
severity: warning
message: Variable name includes redundant container suffix (e.g., users_list)
metadata:
  weight: 2
  category: naming
rule:
  kind: identifier
  regex: _(list|dict|set|tuple|array|map)$
---
id: verbose-identifier
language: python
severity: warning
message: Identifier exceeds 30 characters - consider shortening
metadata:
  weight: 2
  category: naming
rule:
  kind: identifier
  regex: ^[a-zA-Z_][a-zA-Z0-9_]{30,}$
---
id: generic-placeholder-name
language: python
severity: warning
message: Placeholder variable name (tmp/temp/obj/res/ret) - use a concrete name
metadata:
  weight: 2
  category: naming
rule:
  kind: assignment
  has:
    kind: identifier
    field: left
    regex: ^(tmp|temp|obj|res|ret)(?:[0-9]+)?$
