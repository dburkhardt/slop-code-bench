# H3 experiment baseline: single-agent on circuit_eval
# Hypothesis: sc-hypotheses.238
# Tests whether default 70/30 two-agent beats single-agent pass rate

agent:
  type: claude_code
  version: "2.0.51"
  cost_limits:
    step_limit: 100
    cost_limit: 5.0
    net_cost_limit: 20.0

environment: docker-python3.12-uv
prompt: just-solve

model:
  provider: claude_code_local
  name: local-sonnet-4.6

thinking: none
pass_policy: any

output_path: outputs/h3_baseline_circuit_eval/${now:%Y%m%dT%H%M}

problems:
  - circuit_eval
