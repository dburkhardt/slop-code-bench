# H203 experiment treatment: two-agent with anti-slop reviewer on file_backup + todo_app
# Hypothesis: sc-hypotheses.203
# Structured reviewer prompts that explicitly target verbosity reduce
# the verbosity slope compared to baseline.

agent:
  type: reviewer_coder
  version: "2.0.51"
  cost_limits:
    step_limit: 100
    cost_limit: 5.0
    net_cost_limit: 20.0
  coder_turns_per_batch: 10
  num_review_cycles: 3

environment: docker-python3.12-uv
prompt: just-solve

model:
  provider: anthropic
  name: opus-4.5

thinking: none
pass_policy: any

output_path: outputs/h203_anti_slop/two_agent_anti_slop_${now:%Y%m%dT%H%M}

problems:
  - file_backup
  - todo_app
