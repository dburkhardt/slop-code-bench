# H262 experiment treatment: two-agent (70/30) with default_reviewer on file_merger
# Hypothesis: sc-hypotheses.262
# Two-agent benefit extends to eve_industry and file_merger (domain diversity test)

agent:
  type: reviewer_coder
  version: "2.0.51"
  cost_limits:
    step_limit: 100
    cost_limit: 5.0
    net_cost_limit: 20.0
  coder_turns_per_batch: 10
  num_review_cycles: 3

environment: docker-python3.12-uv
prompt: just-solve

model:
  provider: claude_code_local
  name: local-claude-sonnet-4-6

reviewer:
  prompt: configs/prompts/default_reviewer.jinja
  budget_split: 70

thinking: none
pass_policy: any

output_path: outputs/h262_domain_diversity/two_agent_file_merger_${now:%Y%m%dT%H%M}

problems:
  - file_merger
