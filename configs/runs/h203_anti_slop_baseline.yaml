# H203 experiment baseline: single-agent on file_backup + todo_app
# Hypothesis: sc-hypotheses.203
# Structured reviewer prompts that explicitly target verbosity reduce
# the verbosity slope compared to baseline.

agent:
  type: claude_code
  version: "2.0.51"
  cost_limits:
    step_limit: 100
    cost_limit: 5.0
    net_cost_limit: 20.0

environment: docker-python3.12-uv
prompt: just-solve

model:
  provider: anthropic
  name: opus-4.5

thinking: none
pass_policy: any

output_path: outputs/h203_anti_slop/baseline_${now:%Y%m%dT%H%M}

problems:
  - file_backup
  - todo_app
