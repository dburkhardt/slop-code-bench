# H261 experiment: two-agent (70/30) with default reviewer on etl_pipeline
# Hypothesis: sc-hypotheses.261
# Two-agent benefit generalizes to high-checkpoint problems

agent:
  type: reviewer_coder
  cost_limits:
    step_limit: 100
    cost_limit: 5.0
    net_cost_limit: 25.0
  coder_turns_per_batch: 10
  num_review_cycles: 3

environment: local-py
prompt: just-solve

model:
  provider: claude_code_local
  name: local-claude-sonnet-4-6

thinking: none
pass_policy: any

output_path: outputs/h261_etl_pipeline_two_agent/${now:%Y%m%dT%H%M}

problems:
  - etl_pipeline
