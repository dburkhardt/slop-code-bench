# H233 experiment: two-agent (70/30) with structured reviewer on file_backup
# Hypothesis: sc-hypotheses.233
# Tests whether structured review reduces verbosity slope

agent:
  type: reviewer_coder
  version: "2.0.51"
  cost_limits:
    step_limit: 100
    cost_limit: 5.0
    net_cost_limit: 20.0
  coder_turns_per_batch: 10
  num_review_cycles: 3

environment: docker-python3.12-uv
prompt: just-solve

model:
  provider: anthropic
  name: opus-4.5

thinking: none
pass_policy: any

output_path: outputs/h233_file_backup_structured_review/${now:%Y%m%dT%H%M}

problems:
  - file_backup
