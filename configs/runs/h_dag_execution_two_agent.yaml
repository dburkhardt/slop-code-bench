# H-dag_execution experiment: two-agent (70/30) reviewer_coder
# Hypothesis: sc-hypotheses.255
# Tests whether default 70/30 two-agent beats single-agent pass rate

agent:
  type: reviewer_coder
  version: "2.0.51"
  cost_limits:
    step_limit: 100
    cost_limit: 5.0
    net_cost_limit: 20.0
  coder_turns_per_batch: 10
  num_review_cycles: 3

environment: docker-python3.12-uv
prompt: just-solve

model:
  provider: claude_code_local
  name: local-sonnet-4.6

thinking: none
pass_policy: any

output_path: outputs/h_dag_execution_two_agent/${now:%Y%m%dT%H%M}

problems:
  - dag_execution
