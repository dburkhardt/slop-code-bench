# H261 experiment baseline: single-agent on etl_pipeline
# Hypothesis: sc-hypotheses.261
# Two-agent benefit generalizes to high-checkpoint problems

agent:
  type: claude_code
  cost_limits:
    step_limit: 100
    cost_limit: 5.0
    net_cost_limit: 25.0

environment: local-py
prompt: just-solve

model:
  provider: claude_code_local
  name: local-claude-sonnet-4-6

thinking: none
pass_policy: any

output_path: outputs/h261_etl_pipeline_baseline/${now:%Y%m%dT%H%M}

problems:
  - etl_pipeline
