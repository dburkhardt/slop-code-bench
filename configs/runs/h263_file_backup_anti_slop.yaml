# H263 experiment treatment: two-agent with anti-slop reviewer on file_backup
# Hypothesis: sc-hypotheses.263
# Anti-slop reviewer reduces verbosity without hurting pass rate.

agent:
  type: reviewer_coder
  version: "2.0.51"
  cost_limits:
    step_limit: 100
    cost_limit: 5.0
    net_cost_limit: 20.0
  coder_turns_per_batch: 10
  num_review_cycles: 3

environment: docker-python3.12-uv
prompt: just-solve

model:
  provider: claude_code_local
  name: local-claude-sonnet-4-6

reviewer:
  prompt: research/prompts/anti-slop-reviewer.jinja
  budget_split: 70

thinking: none
pass_policy: any

output_path: outputs/h263_anti_slop_reviewer/two_agent_file_backup_${now:%Y%m%dT%H%M}

problems:
  - file_backup
