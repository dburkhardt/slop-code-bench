internal_name: aws/anthropic/bedrock-claude-sonnet-4-6
provider: nvidia
pricing:
  input: 3
  output: 15
  cache_read: 0.30
  cache_write: 3.75
aliases:
  - nvidia/bedrock-claude-sonnet-4.6
  - nvidia-sonnet-4.6

# Claude Code CLI rejects NIM model names (aws/anthropic/...) since
# they aren't in its internal allowlist.  We use a local proxy that
# rewrites the standard Anthropic model name to the NIM name.
# The proxy is started by the experiment pipeline (nvidia_proxy.py).
provider_slugs:
  nvidia: claude-sonnet-4-6

agent_specific:
  claude_code:
    # Use Docker bridge IP so containers can reach the proxy
    base_url: http://172.17.0.1:8200

  mini_swe:
    model_name: openai/aws/anthropic/bedrock-claude-sonnet-4-6
    model_class: litellm
    api_base: https://inference-api.nvidia.com/v1
