# Multi-agent: Claude Code with periodic code quality reviewer
# Alternates coding batches (coder_turns_per_batch turns) with
# reviewer passes (num_review_cycles total), then a final coding batch.
type: reviewer_coder
binary: claude
permission_mode: bypassPermissions
version: 2.0.51
cost_limits:
  cost_limit: 0
  step_limit: 100
  net_cost_limit: 0
coder_turns_per_batch: 20
num_review_cycles: 2
